<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樱花时令 Sakura-Time</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;600;800&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<!-- Synchronous: guaranteed loaded before any body script executes -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sp:#fce8ef;--sb:#f4b8c8;--sm:#e8789a;--sd:#c94e78;--si:#7a1a3a;
  --n0:#0d0509;--n1:#180b10;--n2:#261120;--su:#1e0e16;
  --bo:rgba(232,120,154,0.15);--b2:rgba(232,120,154,0.30);
  --tp:#f8e8ef;--tm:rgba(248,232,239,0.55);--td:rgba(248,232,239,0.30);
  --gold:#d4a853;--em:#3db87a;--am:#e8a040;--sky:#6ec5e0;
  --r:8px;--rl:16px;--rx:24px;
  --fs:'Shippori Mincho','Noto Serif JP',serif;
  --fm:'IBM Plex Mono',monospace;
  --sh:0 4px 24px rgba(0,0,0,0.6);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fs);background:var(--n0);color:var(--tp);display:flex;flex-direction:column}

/* Petals */
#pc{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4}

/* App shell */
#app{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}

/* Topbar */
#tb{display:flex;align-items:center;gap:20px;padding:12px 24px;
  background:linear-gradient(135deg,rgba(26,6,14,.97),rgba(45,21,32,.97));
  border-bottom:1px solid var(--b2);flex-shrink:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:var(--sb);flex-shrink:0}
.logo-ja{font-size:11px;font-weight:300;opacity:.7;margin-top:2px;display:block}
.ntabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border:1px solid var(--bo);border-radius:var(--r);padding:3px}
.ntab{padding:6px 14px;border-radius:5px;cursor:pointer;font-size:13px;font-family:var(--fs);font-weight:600;color:var(--tm);border:none;background:none;transition:all .2s;white-space:nowrap}
.ntab:hover{color:var(--sb)}
.ntab.active{background:linear-gradient(135deg,var(--si),#4a1028);color:var(--sp);box-shadow:0 2px 8px rgba(201,78,120,.3)}
.sbox{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.4);border:1px solid var(--bo);border-radius:var(--r);padding:7px 12px;flex:1;max-width:320px}
.sbox input{background:none;border:none;outline:none;color:var(--tp);font-family:var(--fs);font-size:13px;width:100%}
.sbox input::placeholder{color:var(--td)}
.sbadge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:11px;font-family:var(--fm);background:rgba(61,184,122,.12);border:1px solid rgba(61,184,122,.3);color:var(--em);margin-left:auto;white-space:nowrap}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--em);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

/* Page wrapper — fills space below topbar */
#pw{flex:1;overflow:hidden;position:relative;min-height:0;display:flex;flex-direction:column}

/* Pages */
.pg{display:none;width:100%;height:100%}
.pg.active{display:flex}
#main{flex-direction:row;overflow:hidden}
#pf,#po{flex-direction:column;overflow-y:auto}

/* Sidebar */
#sb{width:340px;flex-shrink:0;background:linear-gradient(180deg,var(--n1) 0%,var(--n2) 100%);
  border-right:1px solid var(--bo);display:flex;flex-direction:column;overflow:hidden}
.sbh{padding:16px 20px 12px;border-bottom:1px solid var(--bo);flex-shrink:0}
.sbt{font-size:11px;font-family:var(--fm);color:var(--tm);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.fchips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:4px 10px;border-radius:12px;cursor:pointer;font-size:11px;border:1px solid var(--bo);color:var(--tm);background:none;font-family:var(--fs);transition:all .2s}
.chip:hover{border-color:var(--sm);color:var(--sb)}
.chip.active{background:linear-gradient(135deg,rgba(201,78,120,.3),rgba(122,26,58,.3));border-color:var(--sm);color:var(--sp)}
.sl{flex:1;overflow-y:auto;padding:8px}
.sl::-webkit-scrollbar{width:4px}
.sl::-webkit-scrollbar-thumb{background:var(--bo);border-radius:2px}

/* Spot cards */
.sc{border:1px solid var(--bo);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .25s;background:rgba(255,255,255,.02);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sm);opacity:0;transition:opacity .2s}
.sc:hover{border-color:var(--b2);background:rgba(255,255,255,.04);transform:translateX(2px)}
.sc:hover::before,.sc.sel::before{opacity:1}
.sc.sel{border-color:var(--sm);background:rgba(232,120,154,.06)}
.sct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.scn{font-size:15px;font-weight:600;color:var(--sp)}
.scj{font-size:11px;color:var(--td);margin-top:1px}
.scr{font-size:10px;font-family:var(--fm);color:var(--tm);background:rgba(255,255,255,.05);padding:2px 7px;border-radius:10px}
.ssr{display:flex;align-items:center;justify-content:space-between}
.spl{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600}
.s-not_yet{background:rgba(100,100,120,.2);color:#8888aa;border:1px solid rgba(100,100,120,.3)}
.s-budding{background:rgba(212,168,83,.15);color:var(--gold);border:1px solid rgba(212,168,83,.3)}
.s-opening{background:rgba(232,160,64,.15);color:var(--am);border:1px solid rgba(232,160,64,.3)}
.s-blooming{background:rgba(232,120,154,.15);color:var(--sb);border:1px solid rgba(232,120,154,.3)}
.s-full_bloom{background:rgba(201,78,120,.2);color:var(--sp);border:1px solid rgba(201,78,120,.5)}
.s-falling{background:rgba(110,197,224,.12);color:var(--sky);border:1px solid rgba(110,197,224,.3)}
.s-ended{background:rgba(80,80,80,.2);color:#666;border:1px solid rgba(80,80,80,.3)}
.bb{display:flex;align-items:center;gap:6px;flex:1;margin-left:10px}
.bbt{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.bbf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--si),var(--sm),var(--sb));transition:width .8s}
.bbp{font-size:10px;font-family:var(--fm);color:var(--td);min-width:26px}
.sfd{margin-top:8px;font-size:11px;color:var(--tm);display:flex;gap:12px}
.sfw{margin-top:6px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tm)}

/* Map */
#mc{flex:1;position:relative;background:var(--n0);min-width:0;min-height:0;overflow:hidden}
#map{position:absolute;inset:0;width:100%;height:100%}
.leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(.85) saturate(.7)}
.mctrl{position:absolute;top:16px;right:16px;z-index:400;display:flex;flex-direction:column;gap:8px}
.mbtn{width:38px;height:38px;background:rgba(26,10,14,.95);border:1px solid var(--b2);border-radius:var(--r);cursor:pointer;color:var(--tp);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(12px)}
.mbtn:hover{background:rgba(201,78,120,.2);border-color:var(--sm)}

/* Offline panel on map */
.ofp{position:absolute;bottom:16px;right:16px;z-index:400;background:rgba(26,10,14,.95);border:1px solid var(--b2);border-radius:var(--rl);padding:16px;backdrop-filter:blur(20px);width:260px;display:none}
.ofp.vis{display:block}
.oft{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--sb)}
.ofd{font-size:11px;color:var(--tm);margin-bottom:12px;line-height:1.6}
.ozr{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.zc{padding:4px 8px;border-radius:6px;font-size:10px;font-family:var(--fm);cursor:pointer;border:1px solid var(--bo);color:var(--tm);background:none}
.zc.sel{background:rgba(201,78,120,.2);border-color:var(--sm);color:var(--sb)}
.dlb{width:100%;padding:9px;border-radius:var(--r);background:linear-gradient(135deg,var(--si),#4a1028);border:1px solid rgba(232,120,154,.4);color:var(--sp);font-size:13px;font-family:var(--fs);font-weight:600;cursor:pointer;transition:all .2s}
.dlb:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,78,120,.4)}
.dlp{margin-top:10px;display:none}
.dlp.vis{display:block}
.dlbt{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:4px}
.dlbf{height:100%;background:linear-gradient(90deg,var(--si),var(--sb));border-radius:2px;transition:width .3s}

/* Detail panel */
#dp{width:380px;flex-shrink:0;background:linear-gradient(180deg,var(--n1) 0%,var(--n0) 100%);border-left:1px solid var(--bo);display:flex;flex-direction:column;overflow:hidden;transition:width .3s,opacity .3s}
#dp.hid{width:0;opacity:0;pointer-events:none}
.dscr{flex:1;overflow-y:auto}
.dscr::-webkit-scrollbar{width:4px}
.dscr::-webkit-scrollbar-thumb{background:var(--bo);border-radius:2px}
.dh{position:relative;padding:24px;background:linear-gradient(135deg,rgba(201,78,120,.15),rgba(122,26,58,.1));border-bottom:1px solid var(--bo)}
.dcl{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.4);border:1px solid var(--bo);color:var(--tm);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.dcl:hover{color:var(--sb)}
.dn{font-size:24px;font-weight:800;color:var(--sp);margin-bottom:4px}
.dns{font-size:13px;color:var(--tm);margin-bottom:16px}
.dmeta{display:flex;flex-wrap:wrap;gap:8px}
.mc2{padding:4px 10px;border-radius:12px;font-size:11px;background:rgba(255,255,255,.06);border:1px solid var(--bo);color:var(--tm)}
.ds{padding:20px 24px;border-bottom:1px solid var(--bo)}
.sl2{font-size:10px;font-family:var(--fm);letter-spacing:.12em;color:var(--td);text-transform:uppercase;margin-bottom:14px}
.bbi{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.br{width:80px;height:80px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 20px rgba(201,78,120,.3)}
.bri{width:60px;height:60px;border-radius:50%;background:var(--n1);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--sb)}
.bic{flex:1}
.bsb{font-size:18px;font-weight:700;color:var(--sp);margin-bottom:4px}
.bdc{font-size:12px;color:var(--tm);line-height:1.6}

/* Bloom timeline */
.btl{margin-top:16px}
.tlt{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.3);border:1px solid var(--bo);border-radius:var(--rl);padding:12px 16px;flex-wrap:wrap}
.tlp{flex:1;text-align:center;padding:8px 6px;border-radius:var(--r);min-width:80px}
.tlp-o{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.25)}
.tlp-f{background:rgba(201,78,120,.15);border:1px solid rgba(201,78,120,.35)}
.tlp-e{background:rgba(110,197,224,.08);border:1px solid rgba(110,197,224,.2)}
.phl{font-size:12px;color:var(--tm);margin-bottom:4px}
.phd{font-size:14px;font-weight:700;color:var(--sp);font-family:var(--fm)}
.tla{color:var(--td);font-size:16px;flex-shrink:0}
.tld{margin-top:8px;font-size:11px;color:var(--tm);font-family:var(--fm);text-align:center}

/* Best time */
.btc{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:var(--r);background:rgba(255,255,255,.02);border:1px solid var(--bo)}
.bti{font-size:20px;flex-shrink:0;margin-top:1px}
.btb{flex:1}
.btt{font-size:11px;color:var(--sb);font-weight:600;margin-bottom:3px;letter-spacing:.04em}
.btx{font-size:12px;color:var(--tm);line-height:1.6}

/* 7-day weather */
.wf{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.wfd{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 3px;border-radius:var(--r);background:rgba(255,255,255,.02);border:1px solid var(--bo);text-align:center}
.wfl{font-size:9px;color:var(--td);font-family:var(--fm);white-space:nowrap}
.wfi{font-size:18px}
.wft{display:flex;gap:3px;font-size:10px;flex-wrap:wrap;justify-content:center}
.wfh{color:var(--sb);font-weight:700}
.wflo{color:var(--td)}
.wfp{font-size:9px;color:var(--sky);font-family:var(--fm)}
.wfw{font-size:9px;color:var(--td);font-family:var(--fm)}
.wfa{font-size:9px;font-weight:700;padding:2px 4px;border-radius:6px;border:1px solid;white-space:nowrap}
.wleg{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:10px;color:var(--tm);padding:6px 2px}
.wli{font-weight:600}

/* Weather strip */
.ws{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.wi{text-align:center;padding:10px 4px;background:rgba(255,255,255,.03);border-radius:var(--r);border:1px solid var(--bo)}
.wic{font-size:20px;margin-bottom:4px}
.wiv{font-size:15px;font-weight:700;color:var(--sb)}
.wil{font-size:9px;color:var(--td);font-family:var(--fm)}

/* Charts */
.cw{height:180px;position:relative}
.hw{height:160px;position:relative}

/* Forecast grid */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fb{padding:12px;border-radius:var(--r);border:1px solid var(--bo);background:rgba(255,255,255,.02)}
.fbl{font-size:10px;color:var(--td);font-family:var(--fm);margin-bottom:4px}
.fbd{font-size:16px;font-weight:700;color:var(--sb)}
.fbc{font-size:10px;color:var(--tm);margin-top:2px}

/* Popup */
.sakura-popup .leaflet-popup-content-wrapper{background:rgba(26,10,14,.97)!important;border:1px solid var(--b2)!important;border-radius:var(--rl)!important;color:var(--tp)!important;box-shadow:var(--sh)!important}
.sakura-popup .leaflet-popup-tip{background:rgba(26,10,14,.97)!important}
.sakura-popup .leaflet-popup-content{min-width:220px}
.pn{font-size:14px;font-weight:700;color:var(--sb);margin-bottom:6px}
.pr{font-size:11px;color:var(--tm);display:flex;justify-content:space-between;gap:12px}

/* Sakura marker */
.sm2{width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 12px rgba(0,0,0,.5);font-size:14px;cursor:pointer}
.sm2 span{transform:rotate(45deg)}

/* Front page */
#pf{padding:32px;gap:24px;background:radial-gradient(ellipse at top,rgba(201,78,120,.08) 0%,transparent 60%)}
.fhd{text-align:center;margin-bottom:8px}
.ftt{font-size:32px;font-weight:800;color:var(--sb);letter-spacing:-.02em}
.fts{font-size:13px;color:var(--tm);margin-top:4px;font-family:var(--fm)}
.fgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.fc{border:1px solid var(--bo);border-radius:var(--rl);padding:20px;background:rgba(255,255,255,.02);transition:all .25s;cursor:pointer}
.fc:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.fcr{font-size:11px;font-family:var(--fm);color:var(--td);margin-bottom:8px}
.fcn{font-size:18px;font-weight:700;color:var(--sp);margin-bottom:12px}
.fcs{display:flex;align-items:center;justify-content:space-between}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sb2{padding:16px;border-radius:var(--rl);border:1px solid var(--bo);background:rgba(255,255,255,.02);text-align:center}
.sv{font-size:28px;font-weight:800;color:var(--sb);margin-bottom:4px}
.slb{font-size:11px;color:var(--tm)}

/* Offline page */
#po{padding:32px;gap:24px;background:radial-gradient(ellipse at top,rgba(61,184,122,.05) 0%,transparent 50%)}
.oh{font-size:24px;font-weight:700;color:var(--tp)}
.ocs{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.oc{border:1px solid var(--bo);border-radius:var(--rl);padding:20px;background:rgba(255,255,255,.02)}
.caa{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.can{font-size:15px;font-weight:600}
.cas{font-size:11px;font-family:var(--fm);color:var(--tm)}
.cam{font-size:11px;color:var(--td)}
.db2{margin-top:12px;padding:7px 14px;border-radius:var(--r);border:1px solid rgba(255,100,100,.3);background:rgba(255,50,50,.08);color:#ff8888;font-size:12px;font-family:var(--fs);cursor:pointer}
.rs{border:1px solid var(--bo);border-radius:var(--rl);padding:24px;background:rgba(255,255,255,.02)}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin:16px 0}
.rdc{padding:12px;border-radius:var(--r);border:1px solid var(--bo);cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02)}
.rdc:hover{border-color:var(--sm);background:rgba(232,120,154,.06)}
.rdc.sel{border-color:var(--sm);background:rgba(201,78,120,.1)}
.rdn{font-size:13px;font-weight:600;margin-bottom:4px}
.rds{font-size:10px;font-family:var(--fm);color:var(--td)}
.bdl{padding:14px 28px;border-radius:var(--rl);background:linear-gradient(135deg,var(--si),#4a1028);border:1px solid rgba(232,120,154,.4);color:var(--sp);font-size:15px;font-family:var(--fs);font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.bdl:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(201,78,120,.4)}
.sti{display:flex;align-items:center;gap:16px;padding:12px 16px;border-radius:var(--r);background:rgba(0,0,0,.3);border:1px solid var(--bo);margin-top:16px}
.stb{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.stbf{height:100%;background:linear-gradient(90deg,var(--em),var(--am));border-radius:3px}
.stt{font-size:11px;font-family:var(--fm);color:var(--tm);white-space:nowrap}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(26,10,14,.97);border:1px solid var(--b2);border-radius:var(--rl);padding:12px 20px;font-size:13px;z-index:9999;transition:transform .3s;backdrop-filter:blur(20px);box-shadow:var(--sh)}
#toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:1100px){#dp{display:none}#sb{width:300px}}
@media(max-width:768px){#sb{display:none}.sr{grid-template-columns:repeat(2,1fr)}.ntab{padding:6px 10px;font-size:12px}}
@media(max-width:420px){.wf{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<canvas id="pc"></canvas>
<div id="app">
  <div id="tb">
    <div class="logo">
      <span>🌸</span>
      <div><span>樱花时令</span><span class="logo-ja">Sakura-Time · 桜前線</span></div>
    </div>
    <div class="ntabs">
      <button class="ntab active" data-page="map" onclick="switchPage('map')">🗾 地图</button>
      <button class="ntab" data-page="front" onclick="switchPage('front')">🌊 前线</button>
      <button class="ntab" data-page="offline" onclick="switchPage('offline')">📦 离线</button>
    </div>
    <div class="sbox"><span>🔍</span><input id="si" placeholder="搜索观樱地点…" oninput="filterSpots(this.value)"></div>
    <div class="sbadge"><div class="sdot"></div>实时更新中</div>
  </div>

  <div id="pw">
    <!-- MAP PAGE -->
    <div id="main" class="pg active">
      <div id="sb">
        <div class="sbh">
          <div class="sbt">筛选地区</div>
          <div class="fchips" id="rc">
            <button class="chip active" onclick="filterRegion('all',this)">全部</button>
            <button class="chip" onclick="filterRegion('Kanto',this)">关东</button>
            <button class="chip" onclick="filterRegion('Kinki',this)">近畿</button>

// ── PETALS ───────────────────────────────────────────────────────────────────
function initPetals(){
  const cv=document.getElementById('pc'); if(!cv)return;
  const ctx=cv.getContext('2d'); let W,H,petals=[];
  const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight};
  window.addEventListener('resize',resize); resize();
  const rp=()=>({x:Math.random()*W,y:-20,size:4+Math.random()*8,sx:(Math.random()-.5)*.8,sy:.5+Math.random()*1.2,r:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.05,op:.3+Math.random()*.5,h:340+Math.random()*30});
  const draw=p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.globalAlpha=p.op;ctx.fillStyle=`hsl(${p.h},70%,80%)`;ctx.beginPath();ctx.ellipse(0,0,p.size,p.size*.6,0,0,Math.PI*2);ctx.fill();ctx.restore()};
  const anim=()=>{ctx.clearRect(0,0,W,H);if(petals.length<60&&Math.random()<.3)petals.push(rp());petals=petals.filter(p=>p.y<H+30&&p.x>-30&&p.x<W+30);petals.forEach(p=>{p.x+=p.sx+Math.sin(Date.now()/2000+p.y*.01)*.3;p.y+=p.sy;p.r+=p.rs;draw(p)});requestAnimationFrame(anim)};
  anim();
}

// ── MAP ───────────────────────────────────────────────────────────────────────
let map,MK={},selSpot=null,curZoom=12,ofpVis=false,useSat=false,baseL,satL;

function initMap(){
  map=L.map('map',{center:[36.5,136.5],zoom:6,zoomControl:false});
  baseL=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  satL=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19});
  SPOTS.forEach(addMarker);
  map.on('moveend zoomend',updateSze);
}

function addMarker(s){
  const col=SC[s.status]||'#888';
  const icon=L.divIcon({className:'',html:`<div class="sm2" style="background:${col};border-color:${col}aa"><span>${SE[s.status]}</span></div>`,iconSize:[36,36],iconAnchor:[18,36],popupAnchor:[0,-42]});
  const tl=[{l:'开花',d:s.fFirst,i:'🌸'},{l:'満開',d:s.fFull,i:'🌺'},{l:'散花',d:s.fEnd,i:'🍃'}].map(p=>`<div style="display:flex;align-items:center;gap:6px;margin-top:5px"><span>${p.i}</span><span style="color:#f8e8ef88;font-size:10px;font-family:monospace;min-width:28px">${p.l}</span><span style="color:#f4b8c8;font-size:12px;font-weight:700">${p.d}</span></div>`).join('');
  const adv=s.weekly?.[0]; const ac={绝佳:'#3db87a',良好:'#6ec5e0',一般:'#d4a853',不宜:'#e87878'}[adv?.advice]||'#888';
  MK[s.id]=L.marker([s.lat,s.lng],{icon})
    .bindPopup(`<div class="pn">${s.name} <span style="font-size:11px;opacity:.6">${s.nameJa}</span></div><div class="pr" style="margin-bottom:8px"><span class="spl s-${s.status}" style="font-size:10px;padding:2px 8px">${SE[s.status]} ${SL[s.status]}</span><span style="font-size:12px;color:#f4b8c8;font-weight:700">${s.bloomPct}% 开放</span></div><div style="border-top:1px solid rgba(232,120,154,.15);padding-top:8px;margin-bottom:8px">${tl}</div><div style="border-top:1px solid rgba(232,120,154,.15);padding-top:8px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#f8e8ef88">${s.weather} ${s.temp}°C · 湿度${s.humidity}%</span><span style="font-size:11px;font-weight:700;color:${ac};background:${ac}22;padding:2px 8px;border-radius:10px;border:1px solid ${ac}44">今日${adv?.advice||'—'}</span></div>`,{className:'sakura-popup',maxWidth:240})
    .on('click',()=>showDetail(s.id)).addTo(map);
}

function toggleSat(){if(!useSat){map.removeLayer(baseL);satL.addTo(map);useSat=true;toast('已切换至卫星图像')}else{map.removeLayer(satL);baseL.addTo(map);useSat=false;toast('已切换至街道地图')}}

function toggleOFP(){ofpVis=!ofpVis;document.getElementById('ofp').classList.toggle('vis',ofpVis);if(ofpVis)updateSze()}
function selZoom(z,btn){curZoom=z;document.querySelectorAll('#zchips .zc').forEach(c=>c.classList.remove('sel'));btn.classList.add('sel');updateSze()}
function updateSze(){const mb=((Math.pow(4,curZoom-10+1)*16*15)/1024).toFixed(1);const el=document.getElementById('sze');if(el)el.textContent=`预计大小：约 ${mb} MB`}
function safeCenter(){try{return map&&map.getCenter?map.getCenter():{lat:36.5,lng:136.5}}catch{return{lat:36.5,lng:136.5}}}

const cache=[];
function simDL(info){
  const msgs=['正在计算瓦片…','建立索引…','缓存地图瓦片…','下载樱花数据…','压缩存储…','完成！'];
  let i=0;
  const iv=setInterval(()=>{
    if(i>=msgs.length){clearInterval(iv);cache.push({...info,date:new Date().toLocaleDateString('zh-CN')});saveCache();renderCache();toast(`✅ ${info.name} 下载完成（${info.size} MB）`);return}
    toast(`📥 ${msgs[i++]}`);
  },500);
}
function startDL(){
  const ctr=safeCenter(),z=curZoom;
  const prog=document.getElementById('dlp'),stat=document.getElementById('dls'),bar=document.getElementById('dlbar');
  prog.classList.add('vis'); stat.textContent='正在计算瓦片范围…';
  const steps=[{p:15,m:'建立索引…'},{p:35,m:'缓存地图瓦片…'},{p:60,m:'下载樱花数据…'},{p:80,m:'压缩存储…'},{p:95,m:'验证完整性…'},{p:100,m:'完成！'}];
  let i=0;
  const iv=setInterval(()=>{
    if(i>=steps.length){clearInterval(iv);const mb=((Math.pow(4,z-10+1)*16*15)/1024).toFixed(1);const nm=`区域 ${ctr.lat.toFixed(2)},${ctr.lng.toFixed(2)} z${z}`;cache.push({name:nm,size:mb,zoom:z,date:new Date().toLocaleDateString('zh-CN'),center:ctr});saveCache();renderCache();toast(`✅ 下载完成（${mb} MB）`);prog.classList.remove('vis');return}
    const s=steps[i++];bar.style.width=s.p+'%';stat.textContent=s.m;
  },600);
}
function saveCache(){try{localStorage.setItem('sk_cache',JSON.stringify(cache))}catch{}}
function loadCache(){try{const d=localStorage.getItem('sk_cache');if(d)JSON.parse(d).forEach(a=>cache.push(a))}catch{}}
function renderCache(){
  const el=document.getElementById('cc');
  if(!cache.length){el.innerHTML='<div style="color:var(--tm);font-size:13px;padding:20px 0">暂无缓存数据。</div>';return}
  el.innerHTML=cache.map((a,i)=>`<div class="oc"><div class="caa"><div class="can">📦 ${a.name}</div><div class="cas">${a.size} MB</div></div><div class="cam">缩放 ${a.zoom} · ${a.date}</div><button class="db2" onclick="delCache(${i})">🗑 删除</button></div>`).join('');
  updateStoInfo();
}
function delCache(i){cache.splice(i,1);saveCache();renderCache();toast('已删除缓存')}
function updateStoInfo(){
  const tot=cache.reduce((s,a)=>s+parseFloat(a.size),0);
  const pct=Math.min(100,tot/5).toFixed(0);
  const f=document.getElementById('stbf'),t=document.getElementById('stt');
  if(f)f.style.width=pct+'%'; if(t)t.textContent=`已用 ${tot.toFixed(1)} MB / 500 MB`;
}

// ── PAGE SWITCHING ────────────────────────────────────────────────────────────
function switchPage(pg){
  document.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('active',t.dataset.page===pg));
  ['main','pf','po'].forEach(id=>{
    const el=document.getElementById(id);
    const match=(pg==='map'&&id==='main')||(pg==='front'&&id==='pf')||(pg==='offline'&&id==='po');

let tTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(()=>el.classList.remove('show'),3000)}

// ── INIT ──────────────────────────────────────────────────────────────────────
function initApp(){
  initPetals();
  initMap();
  renderList(SPOTS);
  renderFront();
  initOffline();
  loadCache();
  renderCache();

  // Set initial display
  document.getElementById('main').style.display='flex';
  document.getElementById('pf').style.display='none';
  document.getElementById('po').style.display='none';

  // Fly to Ueno + open detail
  const ueno=SPOTS.find(s=>s.id==='s01');
  map.flyTo([ueno.lat,ueno.lng],14,{duration:1.8});
  setTimeout(()=>{showDetail('s01');MK['s01']&&MK['s01'].openPopup()},700);

  // Auto download Ueno offline map
  setTimeout(()=>{
    if(!cache.find(a=>a.name.includes('上野'))){
      toast('⏳ 正在自动下载上野公园离线地图…');
      simDL({name:'上野公园区域（默认）',size:'18.4',zoom:14,center:{lat:ueno.lat,lng:ueno.lng}});
    }
  },2200);
}

document.addEventListener('DOMContentLoaded',initApp);
</script>
</body>
</html>
